<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Antibes Serrures — Point Fort FICHET</title>

<meta name="description" content="Serrurier Antibes 24h/24 7j/7">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#090909;color:#fff;font-family:"Exo 2"}
.hero{padding:120px 20px;text-align:center}
h1{font-family:"Bebas Neue";font-size:60px}
.btn{background:#00e676;color:#000;padding:15px 30px;text-decoration:none;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;padding:40px}
.grid img{width:100%;height:200px;object-fit:cover}
</style>
</head>

<body>

<section class="hero">
  <h1>ANTIBES SERRURES</h1>
  <p>Votre sécurité, notre urgence</p>
  <a href="tel:0493616130" class="btn">📞 Appeler</a>
</section>

<section class="grid" id="photoGrid"></section>

<script>

// 🔥 TES PHOTOS (remplace par les tiennes)
const PHOTOS = [
  {src:"images/porte1.jpg", label:"Porte blindée", cat:"portes"},
  {src:"images/serrure1.jpg", label:"Serrure", cat:"serrures"},
  {src:"images/volet1.jpg", label:"Volet roulant", cat:"volets"},
  {src:"images/coffre1.jpg", label:"Coffre-fort", cat:"coffres"},
];

// GENERATE GRID
const grid = document.getElementById("photoGrid");

PHOTOS.forEach(p=>{
  grid.innerHTML += `
    <div>
      <img src="${p.src}">
      <p>${p.label}</p>
    </div>
  `;
});

</script>

</body>
</html>
