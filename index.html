<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
:root{
  --black:#090909;
  --card:#151515;
  --green:#00e676;
  --text:#e8e8e8;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--black);
  color:var(--text);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  padding:15px;
  text-align:center;
  z-index:1000;
}

header h1{
  margin:0;
  color:var(--green);
}

/* HERO */
.hero{
  padding:120px 20px 60px;
  text-align:center;
}

.hero h2{
  font-size:40px;
}

.btn{

  background:var(--green);
  color:#000;
  padding:15px 30px;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}

/* SERVICES */
.services{
  padding:60px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:15px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* GALLERY */
.gallery{
  padding:60px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.grid img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  background:#000;
}
</style>
</head>

</section>

  <div class="card">

  </div>

  <div class="card">
    <img src="images/serrure1.jpg">
    <h3>Serrures A2P</h3>
  </div>

  <p>📞 04 93 61 61 30</p>
